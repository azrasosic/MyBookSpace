<section id="contact" class="contact section">
  <div class="container" data-aos="fade-up" data-aos-delay="100">
    <div class="col-lg-6 mx-auto">

      <div class="text-center mb-4">
        <h3 class="fw-bolder mb-3">Log in to your account</h3>
        <div class="d-flex justify-content-center mb-4">
          <div class="btn-group" role="group" aria-label="Login type">
            <button type="button" class="btn btn-outline-primary active" id="member-tab" onclick="switchLoginTab('member')">
              <i class="bi bi-person me-2"></i>Member Login
            </button>
            <button type="button" class="btn btn-outline-secondary" id="librarian-tab" onclick="switchLoginTab('librarian')">
              <i class="bi bi-person-badge me-2"></i>Staff Login
            </button>
          </div>
        </div>
      </div>

      <form id="member-login-form" class="php-email-form" style="display: block;">
        <div class="row gy-4">
          <div class="col-md-12">
            <div class="input-group">
              <span class="input-group-text">
                <i class="bi bi-envelope"></i>
              </span>
              <input type="email" class="form-control" name="email" placeholder="Your Email" required>
            </div>
          </div>

          <div class="col-md-12">
            <div class="input-group">
              <span class="input-group-text">
                <i class="bi bi-lock"></i>
              </span>
              <input type="password" class="form-control" name="password" placeholder="Your Password" required>
            </div>
          </div>

          <div class="col-md-12">
            <button type="submit" class="btn btn-primary w-100">
              <i class="bi bi-box-arrow-in-right me-2"></i>Login as Member
            </button>
          </div>
        </div>
      </form>

      <form id="librarian-login-form" class="php-email-form" style="display: none;">
        <div class="row gy-4">
          <div class="col-md-12">
            <div class="input-group">
              <span class="input-group-text bg-light">
                <i class="bi bi-envelope-at"></i>
              </span>
              <input type="email" class="form-control" name="librarian_email" placeholder="Staff Email" required>
            </div>
          </div>

          <div class="col-md-12">
            <div class="input-group">
              <span class="input-group-text bg-light">
                <i class="bi bi-key"></i>
              </span>
              <input type="password" class="form-control" name="librarian_password" placeholder="Staff Password" required>
            </div>
          </div>

          <div class="col-md-12">
            <button type="submit" class="btn btn-secondary w-100">
              <i class="bi bi-shield-lock me-2"></i>Login as Staff
            </button>
          </div>
        </div>
      </form>
    </div>
  </div>
</section>

<script>
const switchLoginTab = (tab) => {
  const memberTab = document.getElementById('member-tab');
  const librarianTab = document.getElementById('librarian-tab');
  const memberForm = document.getElementById('member-login-form');
  const librarianForm = document.getElementById('librarian-login-form');

  memberTab.classList.remove('active');
  librarianTab.classList.remove('active');

  if (tab === 'member') {
    memberTab.classList.add('active');
    memberForm.style.display = 'block';
    librarianForm.style.display = 'none';
  } else {
    librarianTab.classList.add('active');
    memberForm.style.display = 'none';
    librarianForm.style.display = 'block';
  }
};
</script>

<script type="text/javascript">
  $(document).ready(() => {
    if (typeof UserController !== 'undefined') {
      UserController.init();
    }
    $(window).on('hashchange', () => {
      if (typeof UserView !== 'undefined') {
        UserView.updateNavigation();
      }
    });
  });
</script>
