<section id="profile" class="profile section">
  <div class="container" data-aos="fade-up" data-aos-delay="100">
    <h3 class="text-center mb-5">Your Profile</h3>
    <div class="row">
      <div class="col-lg-12 col-md-12">
        <table class="table">
          <tbody id="profile-data"></tbody>
        </table>
      </div>
    </div>
    <div class="text-center">
      <button type="button" class="btn float-center me-3" data-bs-toggle="modal" data-bs-target="#editProfileModal" style="background-color: #e96b56; color: white;">Edit Profile</button>
      <button type="button" class="btn float-center" data-bs-toggle="modal" data-bs-target="#changePasswordModal" style="background-color: #5a67d8; color: white;">Change Password</button>
    </div>
  </div>
</section>

<div class="modal fade modal-color" id="editProfileModal" tabindex="-1" aria-labelledby="editProfileModalLabel" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h4 class="modal-title" id="editProfileModalLabel"><i class="fa-solid fa-user"></i> Edit Profile</h4>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <form id="profileEditForm">
          <div class="mb-3">
            <label for="editName" class="form-label">Name</label>
            <input type="text" class="form-control" id="editName" name="name" required>
          </div>
          <div class="mb-3">
            <label for="editSurname" class="form-label">Surname</label>
            <input type="text" class="form-control" id="editSurname" name="surname" required>
          </div>
          <div class="mb-3">
            <label for="editDateOfBirth" class="form-label">Date of Birth</label>
            <input type="date" class="form-control" id="editDateOfBirth" name="date_of_birth">
          </div>
          <div class="mb-3">
            <label for="editPhone" class="form-label">Phone</label>
            <input type="tel" class="form-control" id="editPhone" name="phone">
          </div>
          <div class="mb-3">
            <label for="editEmail" class="form-label">Email</label>
            <input type="email" class="form-control" id="editEmail" name="email" required>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
            <button type="submit" class="btn" style="background-color: #e96b56; color: white;">Save Changes</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>

<div class="modal fade modal-color" id="changePasswordModal" tabindex="-1" aria-labelledby="changePasswordModalLabel" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h4 class="modal-title" id="changePasswordModalLabel"><i class="fa-solid fa-key"></i> Change Password</h4>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <form id="changePasswordForm">
          <div class="mb-3">
            <label for="currentPassword" class="form-label">Current Password</label>
            <input type="password" class="form-control" id="currentPassword" name="currentPassword" required>
          </div>
          <div class="mb-3">
            <label for="newPassword" class="form-label">New Password</label>
            <input type="password" class="form-control" id="newPassword" name="newPassword" required minlength="8">
            <div class="form-text">Password must be at least 8 characters long</div>
          </div>
          <div class="mb-3">
            <label for="confirmNewPassword" class="form-label">Confirm New Password</label>
            <input type="password" class="form-control" id="confirmNewPassword" name="confirmNewPassword" required>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
            <button type="submit" class="btn" style="background-color: #5a67d8; color: white;">Change Password</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>

<section id="bookings" class="profile-section">
  <div class="container">
    <h3 class="text-center mb-5">Borrowing History</h3>
    <table class="table">
      <thead>
        <tr>
          <th>Book</th>
          <th>Author</th>
          <th>Borrow Date</th>
          <th>Return Date</th>
          <th>Due Date</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody id="borrowing-history"></tbody>
    </table>
  </div>
</section>

<script type="text/javascript">
  $(document).ready(() => {
    if (window.location.hash.includes('#profile')) {
      if (typeof ProfileController !== 'undefined') {
        ProfileController.init();
      }
    }

    $(window).on('hashchange', () => {
      if (window.location.hash.includes('#profile')) {
        if (typeof ProfileController !== 'undefined') {
          setTimeout(() => {
            ProfileController.init();
          }, 100);
        }
      }
    });
  });
</script>
