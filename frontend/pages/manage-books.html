<section id="admin-manage-books" class="admin-manage-books">
  <div class="container-fluid">
    <div class="mb-5">
      <h2>Books</h2>
      <button class="btn btn-primary my-2" data-bs-toggle="modal" data-bs-target="#addBookModal">Add New Book</button>
      <table class="table table-striped">
        <thead>
          <tr>
            <th>Title</th>
            <th>Author</th>
            <th>ISBN</th>
            <th>Year</th>
            <th>Genre</th>
            <th>Summary</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="books-table-body"></tbody>
      </table>
    </div>
  </div>
</section>

<div class="modal fade" id="addBookModal" tabindex="-1" aria-labelledby="addBookModalLabel" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="addBookModalLabel">Add New Book</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <form id="addBookForm">
          <div class="mb-3">
            <label for="bookTitle" class="form-label">Title</label>
            <input type="text" class="form-control" id="bookTitle" name="title" required>
          </div>
          <div class="mb-3">
            <label for="bookAuthor" class="form-label">Author</label>
            <select class="form-select" id="bookAuthor" name="author_id" required>
              <option value="">Select Author</option>
            </select>
          </div>
          <div class="mb-3">
            <label for="bookISBN" class="form-label">ISBN</label>
            <input type="text" class="form-control" id="bookISBN" name="ISBN">
          </div>
          <div class="mb-3">
            <label for="bookYear" class="form-label">Publication Year</label>
            <input type="number" class="form-control" id="bookYear" name="publication_year" min="1000" max="2026">
          </div>
          <div class="mb-3">
            <label for="bookGenre" class="form-label">Genre</label>
            <select class="form-select" id="bookGenre" name="genre" required>
              <option value="">Select Genre</option>
              <option value="Fiction">Fiction</option>
              <option value="Sci-Fi">Sci-Fi</option>
              <option value="Fantasy">Fantasy</option>
              <option value="Mystery">Mystery</option>
              <option value="Romance">Romance</option>
              <option value="Horror">Horror</option>
              <option value="Biography">Biography</option>
              <option value="History">History</option>
              <option value="Poetry">Poetry</option>
              <option value="Children">Children</option>
            </select>
          </div>
          <div class="mb-3">
            <label for="bookSummary" class="form-label">Summary</label>
            <textarea class="form-control" id="bookSummary" name="summary" rows="3" required></textarea>
          </div>
          <div class="mb-3">
            <label for="bookStatus" class="form-label">Status</label>
            <select class="form-select" id="bookStatus" name="status" required>
              <option value="Available">Available</option>
              <option value="Borrowed">Borrowed</option>
            </select>
          </div>
          <div class="mb-3">
            <label for="bookImageUrl" class="form-label">Image URL</label>
            <input type="text" class="form-control" id="bookImageUrl" name="image_url" required>
          </div>

          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
            <button type="submit" class="btn btn-primary">Add Book</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>

<div class="modal fade" id="editBookModal" tabindex="-1" aria-labelledby="editBookModalLabel" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="editBookModalLabel">Edit Book</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <form id="editBookForm">
          <input type="hidden" id="editBookId" name="id">
          <div class="mb-3">
            <label for="editBookTitle" class="form-label">Title</label>
            <input type="text" class="form-control" id="editBookTitle" name="title" required>
          </div>
          <div class="mb-3">
            <label for="editBookAuthor" class="form-label">Author</label>
            <select class="form-select" id="editBookAuthor" name="author_id" required>
              <option value="">Select Author</option>
            </select>
          </div>
          <div class="mb-3">
            <label for="editBookISBN" class="form-label">ISBN</label>
            <input type="text" class="form-control" id="editBookISBN" name="ISBN">
          </div>
          <div class="mb-3">
            <label for="editBookYear" class="form-label">Publication Year</label>
            <input type="number" class="form-control" id="editBookYear" name="publication_year" min="1000" max="2026">
          </div>
          <div class="mb-3">
            <label for="editBookGenre" class="form-label">Genre</label>
            <select class="form-select" id="editBookGenre" name="genre" required>
              <option value="">Select Genre</option>
              <option value="Fiction">Fiction</option>
              <option value="Sci-Fi">Sci-Fi</option>
              <option value="Fantasy">Fantasy</option>
              <option value="Mystery">Mystery</option>
              <option value="Romance">Romance</option>
              <option value="Horror">Horror</option>
              <option value="Biography">Biography</option>
              <option value="History">History</option>
              <option value="Poetry">Poetry</option>
              <option value="Children">Children</option>
            </select>
          </div>
          <div class="mb-3">
            <label for="editBookSummary" class="form-label">Summary</label>
            <textarea class="form-control" id="editBookSummary" name="summary" rows="3" required></textarea>
          </div>
          <div class="mb-3">
            <label for="editBookStatus" class="form-label">Status</label>
            <select class="form-select" id="editBookStatus" name="status" required>
              <option value="Available">Available</option>
              <option value="Borrowed">Borrowed</option>
            </select>
          </div>
          <div class="mb-3">
            <label for="editBookImageUrl" class="form-label">Image URL</label>
            <input type="text" class="form-control" id="editBookImageUrl" name="image_url" required>
          </div>

          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
            <button type="submit" class="btn btn-primary">Save Changes</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>

<script type="text/javascript">
  $(document).ready(() => {
    if (window.location.hash.includes('#manage-books')) {
      if (typeof ManageBooksController !== 'undefined') {
        ManageBooksController.init();
      }
    }

    $(window).on('hashchange', () => {
      if (window.location.hash.includes('#manage-books')) {
        if (typeof ManageBooksController !== 'undefined') {
          setTimeout(() => {
            ManageBooksController.init();
          }, 100);
        }
      }
    });
  });
</script>
