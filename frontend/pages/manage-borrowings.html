<section id="admin-manage-borrowings" class="admin-manage-borrowings">
  <div class="container-fluid">
    <div class="mb-5">
      <h2>Borrowings</h2>
      <button class="btn btn-primary my-2" data-bs-toggle="modal" data-bs-target="#addBorrowingModal">Add New Borrowing</button>
      <table class="table table-striped">
        <thead>
          <tr>
            <th>Book Name</th>
            <th>User Name</th>
            <th>Librarian</th>
            <th>Borrow Date</th>
            <th>Return/Due Date</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="borrowings-table-body"></tbody>
      </table>
    </div>
  </div>
</section>

<div class="modal fade" id="addBorrowingModal" tabindex="-1" aria-labelledby="addBorrowingModalLabel" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="addBorrowingModalLabel">Add New Borrowing</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <form id="addBorrowingForm">
          <div class="mb-3">
            <label for="borrowingBook" class="form-label">Book</label>
            <select class="form-select" id="borrowingBook" name="book_id" required>
              <option value="">Select Book</option>
            </select>
          </div>
          <div class="mb-3">
            <label for="borrowingUser" class="form-label">User</label>
            <select class="form-select" id="borrowingUser" name="user_id" required>
              <option value="">Select User</option>
            </select>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
            <button type="submit" class="btn btn-primary">Add Borrowing</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>

<div class="modal fade" id="editBorrowingModal" tabindex="-1" aria-labelledby="editBorrowingModalLabel" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="editBorrowingModalLabel">Edit Borrowing</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <form id="editBorrowingForm">
          <input type="hidden" id="editBorrowingId" name="borrowing_id">
          <div class="mb-3">
            <label class="form-label">Book</label>
            <input type="text" class="form-control-plaintext" id="editBorrowingBookDisplay" readonly>
          </div>
          <div class="mb-3">
            <label class="form-label">User</label>
            <input type="text" class="form-control-plaintext" id="editBorrowingUserDisplay" readonly>
          </div>
          <div class="mb-3">
            <label class="form-label">Borrow Date</label>
            <input type="text" class="form-control-plaintext" id="editBorrowingBorrowDateDisplay" readonly>
          </div>
          <div class="mb-3">
            <label class="form-label">Due Date</label>
            <input type="text" class="form-control-plaintext" id="editBorrowingDueDateDisplay" readonly>
          </div>

          <div class="mb-3">
            <label for="editBorrowingReturnDate" class="form-label">Return Date *</label>
            <input type="date" class="form-control" id="editBorrowingReturnDate" name="return_date" required>
            <div class="form-text">Required when marking as "Returned"</div>
          </div>
          <div class="mb-3">
            <label for="editBorrowingStatus" class="form-label">Status</label>
            <select class="form-select" id="editBorrowingStatus" name="status" required>
              <option value="Active">Active</option>
              <option value="Returned">Returned</option>
            </select>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
            <button type="submit" class="btn btn-primary">Save Changes</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>

<script type="text/javascript">
  $(document).ready(() => {
    if (window.location.hash.includes('#manage-borrowings')) {
      if (typeof ManageBorrowingsController !== 'undefined') {
        ManageBorrowingsController.init();
      }
    }

    $(window).on('hashchange', () => {
      if (window.location.hash.includes('#manage-borrowings')) {
        if (typeof ManageBorrowingsController !== 'undefined') {
          setTimeout(() => {
            ManageBorrowingsController.init();
          }, 100);
        }
      }
    });
  });
</script>
