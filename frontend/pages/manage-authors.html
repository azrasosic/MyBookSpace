<section id="admin-manage-authors" class="admin-manage-authors">
  <div class="container-fluid">
    <div class="mb-5">
      <h2>Authors</h2>
      <button class="btn btn-primary my-2" data-bs-toggle="modal" data-bs-target="#addAuthorModal">Add New Author</button>
      <table class="table table-striped">
        <thead>
          <tr>
            <th>Name</th>
            <th>Biography</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="authors-table-body"></tbody>
      </table>
    </div>
  </div>
</section>

<div class="modal fade" id="addAuthorModal" tabindex="-1" aria-labelledby="addAuthorModalLabel" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="addAuthorModalLabel">Add New Author</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <form id="addAuthorForm">
          <div class="mb-3">
            <label for="authorName" class="form-label">Name</label>
            <input type="text" class="form-control" id="authorName" name="name" required>
          </div>
          <div class="mb-3">
            <label for="authorBiography" class="form-label">Biography</label>
            <textarea class="form-control" id="authorBiography" name="biography" rows="3" required></textarea>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
            <button type="submit" class="btn btn-primary">Add Author</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>

<div class="modal fade" id="editAuthorModal" tabindex="-1" aria-labelledby="editAuthorModalLabel" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="editAuthorModalLabel">Edit Author</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <form id="editAuthorForm">
          <input type="hidden" id="editAuthorId" name="id">
          <div class="mb-3">
            <label for="editAuthorName" class="form-label">Name</label>
            <input type="text" class="form-control" id="editAuthorName" name="name" required>
          </div>
          <div class="mb-3">
            <label for="editAuthorBiography" class="form-label">Biography</label>
            <textarea class="form-control" id="editAuthorBiography" name="biography" rows="3" required></textarea>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
            <button type="submit" class="btn btn-primary">Save Changes</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>

<script type="text/javascript">
  $(document).ready(() => {
    const initializeManageAuthors = () => {
      if (window.location.hash.includes('#manage-authors')) {
        setTimeout(() => {
          if (typeof ManageAuthorsController !== 'undefined') {
            ManageAuthorsController.init();
          }
        }, 100);
      }
    };

    initializeManageAuthors();

    $(window).on('hashchange', () => {
      initializeManageAuthors();
    });
  });
</script>
