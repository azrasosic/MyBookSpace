  <script>
    const app = $.spapp({
      defaultView: '#login',
      templateDir: 'pages/',
    });

    app.route({
      view: 'books',
      load: 'books.html',
    });

    app.route({
      view: 'manage-books',
      load: 'manage-books.html',
    });

    app.route({
      view: 'manage-authors',
      load: 'manage-authors.html',
    });

    app.route({
      view: 'manage-borrowings',
      load: 'manage-borrowings.html',
    });

    app.route({
      view: 'manage-librarians',
      load: 'manage-librarians.html',
    });

    app.route({
      view: 'contact',
      load: 'contact.html',
    });

    app.route({
      view: 'register',
      load: 'register.html',
    });

    app.route({
      view: 'login',
      load: 'login.html',
    });

    app.route({
      view: 'profile',
      load: 'profile.html',
    });

    app.route({
      view: 'book-details',
      load: 'book-details.html',
    });

    app.run();
  </script>

  <script>
    $(document).ready(() => {
      if (typeof UserController !== 'undefined') {
        console.log('Initializing UserController...');
        UserController.init();
      } else if (typeof UserService !== 'undefined') {
        console.log('Using legacy UserService...');
        UserService.init();
      } else {
        console.error('No user authentication system found!');
      }

      setTimeout(() => {
        if (typeof UserView !== 'undefined') {
          console.log('Updating navigation via UserView...');
          UserView.updateNavigation();
        } else if (typeof updateNavigation === 'function') {
          console.log('Updating navigation via legacy function...');
          updateNavigation();
        } else {
          console.error('No navigation system found!');
        }
      }, 300);

      $(window).on('hashchange', () => {
        console.log('Hash changed, updating navigation...');
        setTimeout(() => {
          if (typeof UserView !== 'undefined') {
            UserView.updateNavigation();
          } else if (typeof updateNavigation === 'function') {
            updateNavigation();
          }
        }, 100);
      });
    });
  </script>
